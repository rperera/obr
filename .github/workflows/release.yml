name: Release

# Fires when the plugin's CI (in its private source repository) pushes a
# version tag here along with the built plugin files. Publishes those files
# as individual release assets — exactly what Obsidian plugin installers
# download via the GitHub Releases API.
on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        run: |
          manifest=$(jq -r .version manifest.json)
          if [ "$manifest" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match manifest version $manifest"
            exit 1
          fi

      - name: Create release with plugin assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets="manifest.json main.js"
          [ -f styles.css ] && assets="$assets styles.css"
          gh release create "$GITHUB_REF_NAME" $assets \
            --title "$GITHUB_REF_NAME" --generate-notes
